name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  ocr-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ocr-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ocr-service/requirements.txt
      - run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - run: pip install -r requirements.txt
      - run: pip install pytest
      - run: pytest

  backend-api:
    runs-on: ubuntu-latest
    if: hashFiles('backend-api/composer.json') != ''
    defaults:
      run:
        working-directory: backend-api
    env:
      # Doit correspondre au service postgres ci-dessous ; .env.example seul
      # ne suffit pas car il vise le nom de base "siarn" (dev), pas "siarn_test".
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: siarn_test
      DB_USERNAME: siarn
      DB_PASSWORD: siarn
      JWT_SECRET: ci-test-secret-ephemere-non-utilise-en-production
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: siarn_test
          POSTGRES_USER: siarn
          POSTGRES_PASSWORD: siarn
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U siarn -d siarn_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          # 8.4 minimum : Laravel 13 resout des dependances symfony/* qui
          # exigent php>=8.4.1 (decouvert lors du build Docker de backend-api).
          php-version: "8.4"
          extensions: pgsql, pdo_pgsql, mbstring
      - run: composer install --prefer-dist --no-interaction
      - run: cp .env.example .env
      - run: php artisan key:generate
      - run: php artisan migrate --force
      - run: php artisan test
