services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: siarn
      POSTGRES_USER: siarn
      POSTGRES_PASSWORD: siarn
    ports:
      # 5433 cote hote : evite le conflit avec un Postgres natif eventuellement
      # deja present sur la machine de dev (ecoute sur 5432). En interne aux
      # conteneurs, le port reste 5432 (DB_HOST=postgres, DB_PORT=5432).
      - "5433:5432"
    volumes:
      - siarn_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siarn -d siarn"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend-api:
    build:
      context: ./backend-api
    env_file:
      - ./backend-api/.env
    environment:
      # Ecrase les valeurs "hote" du .env : en conteneur, postgres est joignable
      # par son nom de service, pas par 127.0.0.1.
      DB_HOST: postgres
      DB_PORT: 5432
      SQL_MIGRATIONS_DIR: /infra-sql-migrations
      OCR_SERVICE_URL: http://ocr-service:8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend-api:/app
      - ./infra/db/migrations:/infra-sql-migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
      ocr-service:
        condition: service_started

  ocr-service:
    build:
      context: ./ocr-service
    environment:
      OCR_DATABASE_URL: postgresql://siarn:siarn@postgres:5432/siarn
    ports:
      - "8001:8000"
    volumes:
      - ./ocr-service:/app
      - siarn_modeles_ocr:/models/tessdata
    depends_on:
      postgres:
        condition: service_healthy

  # Pipeline d'entrainement OCR (§8, E5) : job ponctuel, jamais demarre par
  # `docker compose up` (profile dedie). Lancer explicitement :
  #   docker compose run --rm ocr-training
  ocr-training:
    profiles: ["training"]
    build:
      context: ./ocr-service
      dockerfile: training/Dockerfile
    environment:
      OCR_DATABASE_URL: postgresql://siarn:siarn@postgres:5432/siarn
    volumes:
      - ./ocr-service:/app
      - siarn_training_travail:/travail
      # Meme volume que ocr-service : le .traineddata final est ecrit
      # directement ou l'inference le cherche (§8.3) - "promouvoir" un
      # modele candidat en actif (E6) n'a alors qu'a mettre a jour le statut
      # en base, aucune copie de fichier entre conteneurs.
      - siarn_modeles_ocr:/models/tessdata
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend-api

volumes:
  siarn_postgres_data:
  siarn_modeles_ocr:
  siarn_training_travail:
